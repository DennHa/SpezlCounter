<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Pauper Overlay - Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-light:        #FAF1D9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Lora', serif;
            font-weight: 400;
            color: var(--color-light);
            width: 100vw;
            height: 80px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .timer-display {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: 0.05em;
            font-family: 'Courier New', monospace;
            text-align: center;
        }


    </style>
</head>
<body>
    <div class="timer-display" id="timer-display">00:00</div>

    <script>
        const DB_URL = 'https://spezlcounter-default-rtdb.europe-west1.firebasedatabase.app/match.json';

        let timerStartTime = null;
        let timerInterval = null;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updateTimer() {
            if (timerStartTime !== null) {
                const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
                document.getElementById('timer-display').textContent = formatTime(elapsed);
            }
        }

        function pollTimer() {
            fetch(DB_URL + '?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data && data.timerStartTime !== undefined) {
                        timerStartTime = data.timerStartTime;
                        updateTimer();
                    }
                })
                .catch(error => {
                    console.error('Poll error:', error);
                });
        }

pollTimer();
        timerInterval = setInterval(() => {
            updateTimer();
            pollTimer();
        }, 100);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Pauper Overlay - Player 1 Wins</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-light:        #FAF1D9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Lora', serif;
            font-weight: 400;
            color: var(--color-light);
            width: 100vw;
            height: 100px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px;
        }

        .game-dots {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .game-dots-label {
            opacity: 0.7;
        }

        .game-dots-container {
            display: flex;
            gap: 12px;
        }

        .game-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.4;
        }

        .game-dot.won {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="game-dots">
        <div class="game-dots-label">Series:</div>
        <div class="game-dots-container" id="p1-dots"></div>
    </div>

    <script>
        const DB_URL = 'https://spezlcounter-default-rtdb.europe-west1.firebasedatabase.app/match.json';
        let lastP1Wins = null;

        function updateGameDots() {
            fetch(DB_URL + '?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data && data.p1) {
                        const gamesWon = data.p1.gamesWon || 0;
                        // Only update DOM if value changed
                        if (gamesWon !== lastP1Wins) {
                            lastP1Wins = gamesWon;
                            const dotsContainer = document.getElementById('p1-dots');
                            dotsContainer.innerHTML = '';
                            for (let i = 0; i < 2; i++) {
                                const dot = document.createElement('div');
                                dot.className = 'game-dot' + (i < gamesWon ? ' won' : '');
                                dotsContainer.appendChild(dot);
                            }
                        }
                    }
                })
                .catch(error => {
                    console.error('Poll error:', error);
                });
        }

        updateGameDots();
        setInterval(updateGameDots, 500);
    </script>
</body>
</html>

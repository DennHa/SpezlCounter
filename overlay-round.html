<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Pauper Overlay - Round</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-light:        #FAF1D9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Lora', serif;
            font-weight: 400;
            color: var(--color-light);
            width: 100vw;
            height: 80px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .round-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 48px;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .round-label {
            opacity: 0.7;
        }

        .round-number {
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="round-display">
        <div class="round-label">Round:</div>
        <div class="round-number" id="round-number">1</div>
    </div>

    <script>
        const DB_URL = 'https://spezlcounter-default-rtdb.europe-west1.firebasedatabase.app/match.json';
        let lastRound = null;

        function updateRound() {
            fetch(DB_URL + '?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data && data.currentRound !== undefined) {
                        // Only update DOM if value changed
                        if (data.currentRound !== lastRound) {
                            lastRound = data.currentRound;
                            document.getElementById('round-number').textContent = data.currentRound;
                        }
                    }
                })
                .catch(error => {
                    console.error('Poll error:', error);
                });
        }

        updateRound();
        setInterval(updateRound, 500);
    </script>
</body>
</html>

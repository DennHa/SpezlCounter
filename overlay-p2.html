<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Pauper Overlay - Player 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Pauper Spezl Design System */
        :root {
            --color-dark:         #11233D;
            --color-light:        #FAF1D9;
            --color-blue-dark:    #1F82C0;
            --color-blue-light:   #5AC0FF;
            --color-green-dark:   #30710B;
            --color-green-light:  #97D375;
            --color-purple-dark:  #38209A;
            --color-purple-light: #8E7DD4;
            --color-red-dark:     #AD230F;
            --color-red-light:    #FF7D6A;
            --color-yellow-dark:  #C88F00;
            --color-yellow-light: #FFDF5E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Lora', serif;
            font-weight: 400;
            color: var(--color-light);
            width: 100vw;
            height: 160px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
        }

        /* Player Card */
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            height: 100%;
        }

        .player-name {
            font-family: 'Lora', serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.8;
            min-height: 16px;
        }

        .life-total {
            font-size: 96px;
            font-weight: 600;
            line-height: 1;
            transition: color 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* Life state colors */
        .life-total.state-danger {
            color: var(--color-red-light);
            animation: pulse-danger 1s infinite;
        }

        .life-total.state-critical {
            color: var(--color-red-dark);
        }

        .life-total.state-warning {
            color: var(--color-yellow-dark);
        }

        .life-total.state-normal {
            color: var(--color-light);
        }

        @keyframes pulse-danger {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Delta animation (floating +/- numbers) */
        .delta {
            position: fixed;
            font-size: 28px;
            font-weight: 600;
            font-family: 'Lora', serif;
            pointer-events: none;
            z-index: 100;
            animation: float-up 1s ease-out forwards;
        }

        .delta.positive {
            color: var(--color-green-light);
        }

        .delta.negative {
            color: var(--color-red-light);
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px);
            }
        }

        /* Connection indicator */
        .connection-status {
            position: fixed;
            bottom: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-green-light);
            box-shadow: 0 0 8px var(--color-green-light);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .connection-status.offline {
            background: var(--color-red-light);
            box-shadow: 0 0 8px var(--color-red-light);
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="player-name" id="p2-name">Spieler 2</div>
        <div class="life-total state-normal" id="p2-life">20</div>
    </div>

    <div class="connection-status" id="connection-status"></div>

    <script>
        // Configuration — replace with your Firebase project URL
        const DB_URL = 'https://spezlcounter-default-rtdb.europe-west1.firebasedatabase.app/match.json';
        
        let lastP2Life = 20;

        // Helper: determine life total color state
        function getLifeState(life) {
            if (life <= 0) return 'state-critical';
            if (life <= 5) return 'state-danger';
            if (life <= 10) return 'state-warning';
            return 'state-normal';
        }

        // Update DOM with new life total and animate delta
        function updateLife(newLife) {
            const element = document.querySelector('#p2-life');
            
            element.textContent = newLife;
            element.className = 'life-total ' + getLifeState(newLife);

            // Show delta animation if changed
            if (lastP2Life !== newLife) {
                const delta = newLife - lastP2Life;
                const sign = delta > 0 ? '+' : '';
                showDelta(sign + delta, element);
            }

            lastP2Life = newLife;
        }

        // Display floating delta number
        function showDelta(text, sourceElement) {
            const deltaEl = document.createElement('div');
            deltaEl.className = 'delta ' + (text.startsWith('+') ? 'positive' : 'negative');
            deltaEl.textContent = text;
            deltaEl.style.left = sourceElement.getBoundingClientRect().left + 'px';
            deltaEl.style.top = sourceElement.getBoundingClientRect().top + 'px';
            document.body.appendChild(deltaEl);

            setTimeout(() => deltaEl.remove(), 1000);
        }

        // Update name in DOM
        function updateName(name) {
            document.querySelector('#p2-name').textContent = name || 'Spieler 2';
        }

        // Set connection status indicator
        function setConnectionStatus(online) {
            const indicator = document.getElementById('connection-status');
            if (online) {
                indicator.classList.remove('offline');
            } else {
                indicator.classList.add('offline');
            }
        }

        // Poll Firebase Realtime Database
        async function poll() {
            try {
                const response = await fetch(DB_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Firebase fetch failed');
                
                const data = await response.json();
                
                if (data && data.p2) {
                    updateName(data.p2.name);
                    updateLife(data.p2.life);
                    setConnectionStatus(true);
                }
            } catch (error) {
                console.error('Poll error:', error);
                setConnectionStatus(false);
            }
        }

        // Start polling
        poll();
        setInterval(poll, 500);
    </script>
</body>
</html>

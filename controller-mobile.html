<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>MTG Pauper Controller Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-dark:         #11233D;
            --color-light:        #FAF1D9;
            --color-red-light:    #FF7D6A;
            --color-red-dark:     #AD230F;
            --color-yellow-dark:  #C88F00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--color-dark);
            color: var(--color-light);
            font-family: 'Lora', serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Name Entry Modal - Mobile */
        .name-entry-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--color-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .name-entry-modal.hidden {
            display: none;
        }

        .name-entry-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .name-inputs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            width: 100%;
            padding: 0;
        }

        .name-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .name-input-sublabel {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .name-input-label {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        .name-input-field {
            width: 100%;
            max-width: 280px;
            padding: 12px 16px;
            background: transparent;
            color: var(--color-light);
            font-family: 'Lora', serif;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.05em;
            outline: none;
            transition: opacity 0.3s;
            border: none;
            border-bottom: 2px solid var(--color-light);
            -webkit-user-select: text;
            user-select: text;
        }

        .name-input-field:focus {
            opacity: 1;
        }

        .name-input-field::placeholder {
            color: var(--color-light);
            opacity: 0.4;
        }

        .name-entry-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .name-entry-start-btn,
        .name-entry-skip-btn {
            padding: 12px 32px;
            border: none;
            font-family: 'Lora', serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
            border-radius: 4px;
            flex: 1;
            min-width: 140px;
        }

        .name-entry-start-btn {
            background: var(--color-light);
            color: var(--color-dark);
        }

        .name-entry-skip-btn {
            background: transparent;
            color: var(--color-light);
            border: 2px solid var(--color-light);
        }

        .name-entry-start-btn:active,
        .name-entry-skip-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* Main Game UI - Mobile */
        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .game-container.hidden {
            display: none;
        }

        .games-area {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            background: var(--color-dark);
            position: relative;
        }

        .player-zone {
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
        }

        .player-zone.p1 {
            color: #FAF1D9;
            grid-column: 1;
            background: var(--color-dark);
            transform: rotate(180deg);
        }

        .player-zone.p2 {
            color: #11233D;
            grid-column: 1;
            background: var(--color-light);
        }

        .player-zone-header {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .life-display-large {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -0.05em;
        }

        .delta-display {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.05em;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .delta-display.show {
            opacity: 1;
            transform: scale(1);
        }

        .delta-display:not(.show) {
            opacity: 0;
            transform: scale(0.8);
        }

        .delta-display.positive {
            color: rgba(0, 0, 0, 0.6);
        }

        .delta-display.negative {
            color: rgba(255, 107, 157, 0.8);
        }

        .player-zone.p1 .delta-display.positive {
            color: rgba(250, 241, 217, 0.6);
        }

        .player-zone.p1 .delta-display.negative {
            color: rgba(250, 241, 217, 0.8);
        }

        .player-zone.p2 .delta-display.positive {
            color: rgba(17, 35, 61, 0.6);
        }

        .player-zone.p2 .delta-display.negative {
            color: rgba(17, 35, 61, 0.8);
        }

        .control-strip {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 0;
        }

        .control-strip-center {
            position: absolute;
            right: 0;
            top: 50%;
            
            height: auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-evenly;
            gap: 12px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            transform: translateY(-100%) rotate(90deg);
            transform-origin: center;
            z-index: 100;
        }

        .control-strip-rotated {
            display: flex;
            gap: 0;
            transform: rotate(90deg);
            transform-origin: center;
            width: 160px;
        }

        .control-button {
            flex: 1;
            height: 60px;
            background: rgba(0, 0, 0, 0.15);
            border: none;
            font-size: 32px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            border-radius: 6px;
            margin: 2px;
            color: currentColor;
        }

        .control-button:active {
            background: rgba(0, 0, 0, 0.25);
            transform: scale(0.96);
        }

        .player-zone.p1 .control-button {
            background: rgba(250, 241, 217, 0.15);
            color: #FAF1D9;
        }

        .player-zone.p2 .control-button {
            background: rgba(17, 35, 61, 0.15);
            color: #11233D;
        }

        /* Game dots display */
        .game-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 4px;
            font-size: 14px;
        }

        .game-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.5;
        }

        .game-dot.won {
            opacity: 1;
        }

        .top-controls {
            display: none;
        }

        .timer-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .timer-display-center {
            background: rgba(0, 0, 0, 0.3);
            color: var(--color-light);
            font-size: 12px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.05em;
            padding: 4px 8px;
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .timer-display-center:active {
            background: rgba(0, 0, 0, 0.5);
        }

        .timer-display-center.paused {
            background: rgba(173, 35, 15, 0.5);
            color: #FF7D6A;
            font-size: 14px;
        }

        .round-display-center {
            color: var(--color-light);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .next-game-button {
            background: #5AC0FF;
            border: none;
            color: var(--color-dark);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            padding: 4px 10px;
            transition: all 0.2s;
            min-height: 28px;
            border-radius: 4px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .next-game-button:active {
            transform: scale(0.93);
            opacity: 0.8;
        }

        .end-game-button {
            background: #AD230F;
            border: none;
            color: var(--color-light);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            padding: 4px 10px;
            transition: all 0.2s;
            min-height: 28px;
            border-radius: 4px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .end-game-button:active {
            transform: scale(0.93);
            opacity: 0.8;
        }

        /* Confirmation Modal */
        .confirmation-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(17, 35, 61, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 2000;
            padding: 20px;
        }

        .confirmation-modal.hidden {
            display: none;
        }

        .confirmation-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.05em;
            color: var(--color-light);
        }

        .confirmation-options {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .confirm-btn, .cancel-btn {
            padding: 12px 28px;
            border: none;
            font-family: 'Lora', serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
            border-radius: 4px;
        }

        .confirm-btn {
            background: var(--color-light);
            color: var(--color-dark);
        }

        .cancel-btn {
            background: transparent;
            color: var(--color-light);
            border: 2px solid var(--color-light);
        }

        .confirm-btn:active,
        .cancel-btn:active {
            transform: scale(0.93);
            opacity: 0.8;
        }

        .winner-selector {
            display: flex;
            gap: 16px;
            flex-direction: column;
            width: 100%;
            justify-content: center;
        }

        .winner-btn {
            padding: 12px 32px;
            border: 2px solid var(--color-light);
            background: transparent;
            color: var(--color-light);
            font-family: 'Lora', serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
            border-radius: 4px;
        }

        .winner-btn:active {
            transform: scale(0.93);
            background: var(--color-light);
            color: var(--color-dark);
        }
    </style>
</head>
<body>
    <!-- Name Entry Modal -->
    <div class="name-entry-modal" id="name-entry-modal">
        <div class="name-entry-title">Enter Player Info</div>
        <div class="name-inputs-grid">
            <div class="name-input-group">
                <div class="name-input-label">Player 1</div>
                <div class="name-input-sublabel">Name</div>
                <input type="text" class="name-input-field" id="name-p1" inputmode="text" placeholder="Name...">
                <div class="name-input-sublabel">Deck</div>
                <input type="text" class="name-input-field" id="deck-p1" inputmode="text" placeholder="Deck...">
            </div>
            <div class="name-input-group">
                <div class="name-input-label">Player 2</div>
                <div class="name-input-sublabel">Name</div>
                <input type="text" class="name-input-field" id="name-p2" inputmode="text" placeholder="Name...">
                <div class="name-input-sublabel">Deck</div>
                <input type="text" class="name-input-field" id="deck-p2" inputmode="text" placeholder="Deck...">
            </div>
        </div>
        <div class="name-entry-buttons">
            <button class="name-entry-start-btn" id="start-game-btn">START</button>
            <button class="name-entry-skip-btn" id="skip-game-btn">SKIP</button>
        </div>
    </div>

    <!-- Game UI -->
    <div class="game-container hidden" id="game-container">
        <div class="top-controls">
            <button class="next-game-button" id="reset-life-btn">⏭️ NEXT Round</button>
            <div class="timer-container">
                <div class="timer-display-center" id="timer-display">00:00</div>
                <div class="round-display-center" id="round-display">Round 1</div>
            </div>
            <button class="end-game-button" id="end-game-btn">⏹️ END Game</button>
        </div>

        <!-- Players Area (vertical layout for mobile) -->
        <div class="games-area">
            <!-- Player 1 (Top) -->
            <div class="player-zone p1">
                <div class="player-zone-header" id="display-p1-name">Spieler 1</div>
                <div class="life-display-large" id="display-p1-life">20</div>
                <div class="game-dots" id="p1-dots"></div>
                <div class="delta-display" id="delta-p1-display"></div>
                <div class="control-strip">
                    <button class="control-button" data-player="p1" data-delta="-1">−</button>
                    <button class="control-button" data-player="p1" data-delta="+1">+</button>
                </div>
            </div>

            <!-- Player 2 (Bottom) -->
            <div class="player-zone p2">
                <div class="player-zone-header" id="display-p2-name">Spieler 2</div>
                <div class="life-display-large" id="display-p2-life">20</div>
                <div class="game-dots" id="p2-dots"></div>
                <div class="delta-display" id="delta-p2-display"></div>
                <div class="control-strip">
                    <button class="control-button" data-player="p2" data-delta="-1">−</button>
                    <button class="control-button" data-player="p2" data-delta="+1">+</button>
                </div>
            </div>

            <!-- Controls Column (Right) -->
            <div class="control-strip-center">
                <button class="next-game-button" id="reset-life-btn-center">⏭️</button>
                <div class="timer-display-center" id="timer-display-center">00:00</div>
                <div class="round-display-center" id="round-display-center">Round 1</div>
                <button class="end-game-button" id="end-game-btn-center">⏹️</button>
            </div>
        </div>
    </div>

    <!-- Next Game Confirmation Modal -->
    <div class="confirmation-modal hidden" id="next-game-modal">
        <div class="confirmation-title">Who won this game?</div>
        <div class="winner-selector">
            <button class="winner-btn" id="p1-winner-btn">Player 1</button>
            <button class="winner-btn" id="p2-winner-btn">Player 2</button>
        </div>
        <button class="cancel-btn" id="cancel-next-game-btn">CANCEL</button>
    </div>

    <!-- End Game Confirmation Modal -->
    <div class="confirmation-modal hidden" id="end-game-modal">
        <div class="confirmation-title">End current series?</div>
        <div class="confirmation-options">
            <button class="confirm-btn" id="confirm-end-game-btn">CONFIRM</button>
            <button class="cancel-btn" id="cancel-end-game-btn">CANCEL</button>
        </div>
    </div>

    <script>
        const DB_URL = 'https://spezlcounter-default-rtdb.europe-west1.firebasedatabase.app/match.json';

        let currentState = {
            p1: { name: 'Spieler 1', deck: 'Deck', life: 20, gamesWon: 0 },
            p2: { name: 'Spieler 2', deck: 'Deck', life: 20, gamesWon: 0 },
            currentRound: 1,
            timerStartTime: null,
            boFormat: 3
        };

        let deltaAccumulated = { p1: 0, p2: 0 };
        let deltaTimeouts = { p1: null, p2: null };
        let timerInterval = null;
        let timerPaused = false;
        let timerPausedOffset = 0;

        function updateUI() {
            for (const player of ['p1', 'p2']) {
                const lifeEl = document.getElementById('display-' + player + '-life');
                lifeEl.textContent = currentState[player].life;
                document.getElementById('display-' + player + '-name').textContent = currentState[player].name;
            }
            updateGameDots();
            updateRoundDisplay();
        }

        function updateGameDots() {
            for (const player of ['p1', 'p2']) {
                const dotsContainer = document.getElementById(player + '-dots');
                dotsContainer.innerHTML = '';
                const gamesWon = currentState[player].gamesWon || 0;
                for (let i = 0; i < 2; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'game-dot' + (i < gamesWon ? ' won' : '');
                    dotsContainer.appendChild(dot);
                }
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updateTimerDisplay() {
            if (currentState.timerStartTime !== null) {
                let elapsed;
                if (timerPaused) {
                    elapsed = timerPausedOffset;
                } else {
                    elapsed = Math.floor((Date.now() - currentState.timerStartTime) / 1000) + timerPausedOffset;
                }
                const timeStr = formatTime(elapsed);
                const timerEl = document.getElementById('timer-display');
                const timerCenterEl = document.getElementById('timer-display-center');
                if (timerEl) timerEl.textContent = timeStr;
                if (timerCenterEl) timerCenterEl.textContent = timeStr;
            } else {
                const timerEl = document.getElementById('timer-display');
                const timerCenterEl = document.getElementById('timer-display-center');
                if (timerEl) timerEl.textContent = '00:00';
                if (timerCenterEl) timerCenterEl.textContent = '00:00';
            }
        }

        function updateRoundDisplay() {
            const roundStr = 'Round ' + currentState.currentRound;
            const roundEl = document.getElementById('round-display');
            const roundCenterEl = document.getElementById('round-display-center');
            if (roundEl) roundEl.textContent = roundStr;
            if (roundCenterEl) roundCenterEl.textContent = roundStr;
        }

        function toggleTimer() {
            const timerEl = document.getElementById('timer-display');
            const timerCenterEl = document.getElementById('timer-display-center');
            if (timerPaused) {
                timerPaused = false;
                if (timerEl) timerEl.classList.remove('paused');
                if (timerCenterEl) timerCenterEl.classList.remove('paused');
                currentState.timerStartTime = Date.now() - (timerPausedOffset * 1000);
                updateTimerDisplay();
            } else {
                timerPaused = true;
                if (timerEl) timerEl.classList.add('paused');
                if (timerCenterEl) timerCenterEl.classList.add('paused');
                timerPausedOffset = Math.floor((Date.now() - currentState.timerStartTime) / 1000);
                if (timerEl) timerEl.textContent = 'PAUSE';
                if (timerCenterEl) timerCenterEl.textContent = 'PAUSE';
            }
        }

        function startTimer() {
            currentState.timerStartTime = Date.now();
            timerPaused = false;
            timerPausedOffset = 0;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimerDisplay, 100);
        }

        async function writeToFirebase(patch) {
            try {
                const response = await fetch(DB_URL, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patch)
                });
                if (!response.ok) throw new Error('Firebase write failed');
            } catch (error) {
                console.error('Firebase write error:', error);
            }
        }

        document.getElementById('start-game-btn').addEventListener('click', async () => {
            const p1Name = document.getElementById('name-p1').value.trim() || 'Spieler 1';
            const p1Deck = document.getElementById('deck-p1').value.trim() || 'Deck';
            const p2Name = document.getElementById('name-p2').value.trim() || 'Spieler 2';
            const p2Deck = document.getElementById('deck-p2').value.trim() || 'Deck';

            currentState.p1.name = p1Name;
            currentState.p1.deck = p1Deck;
            currentState.p2.name = p2Name;
            currentState.p2.deck = p2Deck;
            currentState.p1.gamesWon = 0;
            currentState.p2.gamesWon = 0;
            currentState.currentRound = 1;
            timerPaused = false;
            timerPausedOffset = 0;

            await loadBoFormat();
            document.getElementById('name-entry-modal').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            updateUI();
            startTimer();

            writeToFirebase({
                'p1': currentState.p1,
                'p2': currentState.p2,
                'currentRound': currentState.currentRound,
                'timerStartTime': currentState.timerStartTime,
                'boFormat': currentState.boFormat
            });
        });

        document.getElementById('skip-game-btn').addEventListener('click', async () => {
            currentState.p1.name = 'Spieler 1';
            currentState.p1.deck = 'Deck';
            currentState.p2.name = 'Spieler 2';
            currentState.p2.deck = 'Deck';
            currentState.p1.gamesWon = 0;
            currentState.p2.gamesWon = 0;
            currentState.currentRound = 1;
            timerPaused = false;
            timerPausedOffset = 0;

            await loadBoFormat();
            document.getElementById('name-entry-modal').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            updateUI();
            startTimer();

            writeToFirebase({
                'p1': currentState.p1,
                'p2': currentState.p2,
                'currentRound': currentState.currentRound,
                'timerStartTime': currentState.timerStartTime,
                'boFormat': currentState.boFormat
            });
        });

        async function loadBoFormat() {
            try {
                const response = await fetch(DB_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load');
                const data = await response.json();
                if (data && data.boFormat) {
                    currentState.boFormat = data.boFormat;
                }
            } catch (error) {
                console.error('Error loading boFormat:', error);
            }
        }

        document.querySelectorAll('.control-button').forEach(btn => {
            btn.addEventListener('click', () => {
                const player = btn.getAttribute('data-player');
                const delta = parseInt(btn.getAttribute('data-delta'));
                currentState[player].life += delta;
                updateUI();
                updateDeltaDisplay(player, delta);

                writeToFirebase({
                    'p1': currentState.p1,
                    'p2': currentState.p2,
                    'currentRound': currentState.currentRound,
                    'timerStartTime': currentState.timerStartTime
                });
            });
        });

        function updateDeltaDisplay(player, delta) {
            const deltaEl = document.getElementById('delta-' + player + '-display');
            deltaEl.textContent = (delta > 0 ? '+' : '') + delta;
            deltaEl.className = 'delta-display ' + (delta > 0 ? 'positive' : 'negative') + ' show';

            if (deltaTimeouts[player]) clearTimeout(deltaTimeouts[player]);
            deltaTimeouts[player] = setTimeout(() => {
                deltaEl.classList.remove('show');
            }, 1200);
        }

        document.getElementById('timer-display').addEventListener('click', toggleTimer);
        const timerCenterEl = document.getElementById('timer-display-center');
        if (timerCenterEl) {
            timerCenterEl.addEventListener('click', toggleTimer);
        }

        document.getElementById('reset-life-btn').addEventListener('click', () => {
            document.getElementById('next-game-modal').classList.remove('hidden');
        });
        const resetCenterBtn = document.getElementById('reset-life-btn-center');
        if (resetCenterBtn) {
            resetCenterBtn.addEventListener('click', () => {
                document.getElementById('next-game-modal').classList.remove('hidden');
            });
        }

        document.getElementById('end-game-btn').addEventListener('click', () => {
            document.getElementById('end-game-modal').classList.remove('hidden');
        });
        const endCenterBtn = document.getElementById('end-game-btn-center');
        if (endCenterBtn) {
            endCenterBtn.addEventListener('click', () => {
                document.getElementById('end-game-modal').classList.remove('hidden');
            });
        }

        document.getElementById('p1-winner-btn').addEventListener('click', () => {
            currentState.p1.gamesWon++;
            currentState.p2.life = 20;
            currentState.p1.life = 20;
            currentState.currentRound++;
            updateUI();
            startTimer();
            document.getElementById('next-game-modal').classList.add('hidden');

            writeToFirebase({
                'p1': currentState.p1,
                'p2': currentState.p2,
                'currentRound': currentState.currentRound,
                'timerStartTime': currentState.timerStartTime
            });

            checkSeriesEnd();
        });

        document.getElementById('p2-winner-btn').addEventListener('click', () => {
            currentState.p2.gamesWon++;
            currentState.p2.life = 20;
            currentState.p1.life = 20;
            currentState.currentRound++;
            updateUI();
            startTimer();
            document.getElementById('next-game-modal').classList.add('hidden');

            writeToFirebase({
                'p1': currentState.p1,
                'p2': currentState.p2,
                'currentRound': currentState.currentRound,
                'timerStartTime': currentState.timerStartTime
            });

            checkSeriesEnd();
        });

        document.getElementById('cancel-next-game-btn').addEventListener('click', () => {
            document.getElementById('next-game-modal').classList.add('hidden');
        });

        document.getElementById('end-game-btn').addEventListener('click', () => {
            document.getElementById('end-game-modal').classList.remove('hidden');
        });

        document.getElementById('confirm-end-game-btn').addEventListener('click', async () => {
            endSeries();
        });

        document.getElementById('cancel-end-game-btn').addEventListener('click', () => {
            document.getElementById('end-game-modal').classList.add('hidden');
        });

        function checkSeriesEnd() {
            const winsNeeded = Math.ceil(currentState.boFormat / 2);
            if (currentState.p1.gamesWon >= winsNeeded || currentState.p2.gamesWon >= winsNeeded) {
                endSeries();
            }
        }

        function endSeries() {
            currentState.p1.gamesWon = 0;
            currentState.p2.gamesWon = 0;
            currentState.p1.life = 20;
            currentState.p2.life = 20;
            currentState.currentRound = 1;
            if (timerInterval) clearInterval(timerInterval);
            currentState.timerStartTime = null;
            timerPaused = false;
            timerPausedOffset = 0;

            document.getElementById('name-p1').value = '';
            document.getElementById('name-p2').value = '';
            document.getElementById('deck-p1').value = '';
            document.getElementById('deck-p2').value = '';

            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('name-entry-modal').classList.remove('hidden');
            document.getElementById('end-game-modal').classList.add('hidden');
            updateUI();

            writeToFirebase({
                'p1': currentState.p1,
                'p2': currentState.p2,
                'currentRound': currentState.currentRound,
                'timerStartTime': null
            });
        }

        document.querySelectorAll('.name-input-field').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('start-game-btn').click();
                }
            });
        });

        updateUI();
    </script>
</body>
</html>
